<div class="dashboard">
  <div class="page-header">
    <h2 class="page-title">儀表板</h2>
    <p class="page-sub">{{ today }} · 以下為今日即時營運數據</p>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid">
    @for (card of kpiCards; track card.label) {
      <mat-card class="kpi-card" [ngClass]="card.colorClass">
        <div class="kpi-inner">
          <div class="kpi-text">
            <span class="kpi-label">{{ card.label }}</span>
            <span class="kpi-value">{{ card.value }}</span>
          </div>
          <div class="kpi-icon-wrap">
            <mat-icon class="kpi-icon">{{ card.icon }}</mat-icon>
          </div>
        </div>
      </mat-card>
    }
  </div>

  <!-- Charts Row -->
  <div class="charts-row">
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>近七日銷售趨勢</mat-card-title>
        <mat-card-subtitle>單位：新台幣</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content class="chart-content">
        <canvas baseChart
                [data]="lineChartData"
                [options]="lineChartOptions"
                type="line">
        </canvas>
      </mat-card-content>
    </mat-card>
  </div>
</div>
